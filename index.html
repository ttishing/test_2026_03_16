<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Digital Clock Recorder</title>
    
    <!-- iOS Full Screen Mode Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RecClock">

    <link rel="stylesheet" href="style.css">
    
    <!-- 7セグメントデジタルフォント -->
    <link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <video id="preview" autoplay playsinline muted></video>

        <!-- スタート画面 -->
        <div id="startScreen" class="overlay">
            <button id="startButton" class="premium-btn">
                <span class="btn-text">START RECORDING</span>
                <div class="btn-glow"></div>
            </button>
        </div>

        <!-- 録画中・時計表示画面 -->
        <div id="recordingScreen" class="content hidden">
            <div class="clock-full" id="tapArea">
                <!-- 各桁を独立したスロットに入れて固定幅にする -->
                <div class="digit-box main" id="h1">0</div>
                <div class="digit-box main" id="h2">0</div>
                <div class="separator main" id="separator">:</div>
                <div class="digit-box main" id="m1">0</div>
                <div class="digit-box main" id="m2">0</div>
                
                <div class="sec-group">
                    <div class="digit-box sub" id="s1">0</div>
                    <div class="digit-box sub" id="s2">0</div>
                </div>
            </div>
        </div>

        <div id="statusMsg" class="status-msg hidden">SAVED</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
